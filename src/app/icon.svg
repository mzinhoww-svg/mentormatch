<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- MentorMatch favicon: the approved "A Corrente" symbol on the brand ink
       block (brand kit "Circulação"). Two arms rotating around a node; one
       arm Argila, one arm Brasa. Reproduced from the brand spec — not redrawn. -->
  <rect width="100" height="100" rx="22" fill="#14100D"/>
  <g transform="translate(50 50) scale(0.78) translate(-50 -50)" fill="none" stroke-linecap="round" stroke-width="9">
    <path d="M 50 15 C 71 17, 81 35, 69 51 C 62 61, 53 58, 51 50" stroke="#FBF7F0"/>
    <path d="M 50 15 C 71 17, 81 35, 69 51 C 62 61, 53 58, 51 50" stroke="#FF4A1C" transform="rotate(180 50 50)"/>
    <circle cx="50" cy="50" r="5.94" fill="#FBF7F0" stroke="none"/>
  </g>
</svg>
